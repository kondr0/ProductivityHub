server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AuthenticationFilter
              args:
                skip-auth: true

        - id: todo-service
          uri: http://todo-service:8082
          predicates:
            - Path=/api/todos/**
          filters:
            - name: AuthenticationFilter

        - id: finance-service
          uri: http://finance-service:8083
          predicates:
            - Path=/api/finance/**
          filters:
            - name: AuthenticationFilter

        - id: notes-service
          uri: http://notes-service:8084
          predicates:
            - Path=/api/notes/**
          filters:
            - name: AuthenticationFilter

        - id: planner-service
          uri: http://planner-service:8085
          predicates:
            - Path=/api/planner/**
          filters:
            - name: AuthenticationFilter

        - id: dashboard-service
          uri: http://dashboard-service:8086
          predicates:
            - Path=/api/dashboard/**
          filters:
            - name: AuthenticationFilter

        - id: module-registry-service
          uri: http://module-registry-service:8087
          predicates:
            - Path=/api/modules/**
          filters:
            - name: AuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${ALLOWED_ORIGINS:*}
            allowedMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

logging:
  level:
    com.productivityhub.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway

app:
  auth:
    service-url: http://auth-service:8081
  module-registry:
    service-url: http://module-registry-service:8087
