<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductivityHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Auth page -->
  <div id="auth-page" class="page">
    <div class="auth-container">
      <h1>ProductivityHub</h1>
      <p class="subtitle">Платформа управления продуктивностью</p>
      <div class="auth-error" id="auth-error"></div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-auth="login">Вход</button>
        <button class="auth-tab" data-auth="register">Регистрация</button>
      </div>
      <form id="login-form" class="auth-form active">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
      </form>
      <form id="register-form" class="auth-form">
        <input type="text" id="reg-username" placeholder="Имя пользователя" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Пароль" required>
        <button type="submit">Зарегистрироваться</button>
      </form>
    </div>
  </div>

  <!-- App page -->
  <div id="app-page" class="page">
    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">PH</span>
        <button id="close-sidebar">&times;</button>
      </div>

      <div class="sidebar-user">
        <span class="sidebar-user-icon">&#x1F464;</span>
        <span id="sidebar-user"></span>
      </div>

      <nav id="sidebar-nav"></nav>

      <button id="sidebar-logout">Выйти</button>
    </aside>

    <!-- Main content -->
    <div id="main-content">
      <header>
        <button id="burger-btn">&#9776;</button>
        <h1 id="page-title">Дашборд</h1>
        <div id="header-actions"></div>
      </header>

      <main>
        <div id="tab-dashboard" class="tab-content active"></div>
        <div id="tab-todos" class="tab-content"></div>
        <div id="tab-notes" class="tab-content"></div>
        <div id="tab-finance" class="tab-content"></div>
        <div id="tab-planner" class="tab-content"></div>
      </main>
    </div>
  </div>

  <!-- Dashboard config modal -->
  <div id="config-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Настройка дашборда</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="config-body"></div>
      <div class="modal-footer">
        <button id="config-save" class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
