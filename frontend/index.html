<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProductivityHub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="auth-page" class="page active">
  <div class="auth-container">
    <h1>ProductivityHub</h1>
    <p class="subtitle">Модульная платформа продуктивности</p>
    <div class="toggle">
      <button id="toggle-login" class="active">Вход</button>
      <button id="toggle-register">Регистрация</button>
    </div>
    <form id="login-form" class="auth-form active">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Пароль" required>
      <button type="submit">Войти</button>
      <p id="login-error" class="error"></p>
    </form>
    <form id="register-form" class="auth-form">
      <input type="text" id="reg-username" placeholder="Имя пользователя" required>
      <input type="email" id="reg-email" placeholder="Email" required>
      <input type="password" id="reg-password" placeholder="Пароль" required>
      <button type="submit">Зарегистрироваться</button>
      <p id="reg-error" class="error"></p>
    </form>
  </div>
</div>

<div id="app-page" class="page">
  <header>
    <h1>ProductivityHub</h1>
    <div class="user-info">
      <span id="user-email"></span>
      <button id="logout-btn">Выйти</button>
    </div>
  </header>
  <nav id="tabs">
    <button class="tab active" data-tab="todos">Задачи</button>
    <button class="tab" data-tab="notes">Заметки</button>
    <button class="tab" data-tab="finance">Финансы</button>
    <button class="tab" data-tab="planner">Планировщик</button>
    <button class="tab" data-tab="dashboard">Дашборд</button>
    <button class="tab" data-tab="modules">Модули</button>
  </nav>
  <main>
    <div id="tab-todos" class="tab-content active">
      <h2>Задачи</h2>
      <form id="todo-form" class="inline-form">
        <input type="text" id="todo-title" placeholder="Название задачи" required>
        <select id="todo-priority">
          <option value="LOW">Низкий</option>
          <option value="MEDIUM">Средний</option>
          <option value="HIGH" selected>Высокий</option>
        </select>
        <button type="submit">+</button>
      </form>
      <ul id="todo-list" class="item-list"></ul>
    </div>
    <div id="tab-notes" class="tab-content">
      <h2>Заметки</h2>
      <form id="note-form" class="inline-form">
        <input type="text" id="note-title" placeholder="Заголовок" required>
        <input type="text" id="note-content" placeholder="Текст заметки">
        <button type="submit">+</button>
      </form>
      <ul id="note-list" class="item-list"></ul>
    </div>
    <div id="tab-finance" class="tab-content">
      <h2>Финансы</h2>
      <form id="finance-form" class="inline-form">
        <select id="finance-type">
          <option value="INCOME">Доход</option>
          <option value="EXPENSE">Расход</option>
        </select>
        <input type="number" id="finance-amount" placeholder="Сумма" step="0.01" required>
        <input type="text" id="finance-category" placeholder="Категория" required>
        <button type="submit">+</button>
      </form>
      <ul id="finance-list" class="item-list"></ul>
      <p id="finance-balance" class="balance"></p>
    </div>
    <div id="tab-planner" class="tab-content">
      <h2>События</h2>
      <form id="event-form" class="inline-form">
        <input type="text" id="event-title" placeholder="Название" required>
        <input type="datetime-local" id="event-date" required>
        <button type="submit">+</button>
      </form>
      <ul id="event-list" class="item-list"></ul>
    </div>
    <div id="tab-dashboard" class="tab-content">
      <h2>Дашборд</h2>
      <div id="dashboard-content" class="dashboard-grid"></div>
    </div>
    <div id="tab-modules" class="tab-content">
      <h2>Модули</h2>
      <ul id="module-list" class="item-list"></ul>
    </div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
