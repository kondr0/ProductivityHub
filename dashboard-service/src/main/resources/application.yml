server:
  port: 8086

spring:
  application:
    name: dashboard-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:productivity_hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dashboard
  flyway:
    schemas: dashboard
    default-schema: dashboard
    create-schemas: true
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC

services:
  todo-service: ${SERVICES_TODO_SERVICE:http://localhost:8082}
  finance-service: ${SERVICES_FINANCE_SERVICE:http://localhost:8083}
  notes-service: ${SERVICES_NOTES_SERVICE:http://localhost:8084}
  planner-service: ${SERVICES_PLANNER_SERVICE:http://localhost:8085}

logging:
  level:
    com.productivityhub.dashboard: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api/dashboard/v3/api-docs
  swagger-ui:
    path: /api/dashboard/swagger-ui.html
  packages-to-scan: com.productivityhub.dashboard.controller
