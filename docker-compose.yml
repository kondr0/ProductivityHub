networks:
  gateway_network:
    driver: bridge
  internal_network:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: productivity-hub-db
    environment:
      POSTGRES_DB: productivity_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      MODULE_REGISTRY_URL: http://module-registry-service:8087
    depends_on:
      - auth-service
      - module-registry-service
    networks:
      - gateway_network
      - internal_network

  todo-service:
    build:
      context: .
      dockerfile: todo-service/Dockerfile
    container_name: todo-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  finance-service:
    build:
      context: .
      dockerfile: finance-service/Dockerfile
    container_name: finance-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  notes-service:
    build:
      context: .
      dockerfile: notes-service/Dockerfile
    container_name: notes-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  planner-service:
    build:
      context: .
      dockerfile: planner-service/Dockerfile
    container_name: planner-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  dashboard-service:
    build:
      context: .
      dockerfile: dashboard-service/Dockerfile
    container_name: dashboard-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVICES_TODO_SERVICE: http://todo-service:8082
      SERVICES_FINANCE_SERVICE: http://finance-service:8083
      SERVICES_NOTES_SERVICE: http://notes-service:8084
      SERVICES_PLANNER_SERVICE: http://planner-service:8085
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  module-registry-service:
    build:
      context: .
      dockerfile: module-registry-service/Dockerfile
    container_name: module-registry-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productivity_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  frontend-service:
    build: frontend
    container_name: frontend-service
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
    networks:
      - gateway_network

volumes:
  postgres_data:
